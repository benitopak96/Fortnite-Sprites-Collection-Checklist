<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortnite Sprite Checklist</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0b0e14;
    --panel: #11151f;
    --gold: #e8b339;
    --gummy: #ff5fa3;
    --galaxy: #7c6cf0;
    --have: #2ee6a6;
    --need: #ff5566;
    --ink: #eef0f6;
    --ink-dim: #8d93a8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(124,108,240,0.18), transparent 45%),
      radial-gradient(circle at 85% 90%, rgba(232,179,57,0.10), transparent 50%);
    font-family: 'Space Grotesk', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    padding: 14px 12px 16px;
  }

  .export-container {
    background: var(--bg);
    padding: 4px;
    border-radius: 12px;
    width: 100%;
  }

  .wrap { max-width: 640px; margin: 0 auto; }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid #1d2331;
    padding-bottom: 10px;
    margin-bottom: 8px;
    gap: 10px;
  }

  .title-block .eyebrow {
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--galaxy);
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .title-block h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
    line-height: 1;
  }

  .epic-tag { text-align: right; }

  .epic-tag .label {
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .username-input {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--gold);
    letter-spacing: 1px;
    background: #161b27;
    border: 1px solid #1d2331;
    border-radius: 4px;
    padding: 2px 6px;
    text-align: right;
    max-width: 140px;
    outline: none;
    transition: border-color 0.2s;
  }
  
  .username-input:focus { border-color: var(--gold); }

  .action-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    gap: 10px;
  }

  .hint {
    font-size: 11px;
    color: var(--ink-dim);
    line-height: 1.3;
  }

  .export-btn {
    font-family: 'Bebas Neue', sans-serif;
    background: linear-gradient(135deg, var(--galaxy), #5b49db);
    color: white;
    border: none;
    font-size: 14px;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.5px;
    box-shadow: 0 4px 12px rgba(124,108,240,0.3);
    white-space: nowrap;
    transition: transform 0.1s ease;
  }

  /* Social Export Mode Constraints */
  .social-export-mode {
    width: 600px !important; 
    padding: 15px !important;
  }

  /* Safety padding adjustments to prevent edge trimming on text elements */
  .social-export-mode .header {
    padding-left: 6px !important;
    padding-right: 12px !important;
  }

  .social-export-mode .sprites-grid {
    display: grid !important;
    grid-template-columns: repeat(3, 1fr) !important;
    gap: 5px !important;
  }

  .social-export-mode .sprite-card {
    padding: 5px !important;
    gap: 4px !important;
    border-radius: 8px !important;
  }

  .social-export-mode .sprite-name {
    font-size: 13px !important;
  }

  .social-export-mode .variants-row {
    gap: 3px !important;
  }

  .social-export-mode .variant-icon {
    width: 26px !important;
    height: 26px !important;
  }

  .social-export-mode .toggle {
    padding: 4px 2px !important;
    border-radius: 4px !important;
  }

  .social-export-mode .toggle-label {
    font-size: 6px !important;
    letter-spacing: 0px !important;
  }

  .sprites-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 12px;
  }

  .sprite-card {
    background: var(--panel);
    border: 1px solid #1d2331;
    border-radius: 12px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .sprite-info {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sprite-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.5px;
    line-height: 1;
    text-transform: uppercase;
  }

  .variants-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  .variants-row.single-variant {
    grid-template-columns: 1fr;
  }

  .toggle {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 8px 4px;
    border-radius: 8px;
    border: 2px solid #1d2331;
    background: #161b27;
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
  }

  .toggle:hover { border-color: #3a4154; }

  .toggle.have.normal { border-color: rgba(184,191,209,0.3); background: rgba(184,191,209,0.04); }
  .toggle.have.gold { border-color: rgba(232,179,57,0.3); background: rgba(232,179,57,0.04); }
  .toggle.have.gummy { border-color: rgba(255,95,163,0.3); background: rgba(255,95,163,0.04); }
  .toggle.have.galaxy { border-color: rgba(124,108,240,0.3); background: rgba(124,108,240,0.04); }

  .toggle.max-lvl { border-width: 2px; }
  .toggle.max-lvl.normal { border-color: rgba(184,191,209,0.9); background: rgba(184,191,209,0.12); }
  .toggle.max-lvl.gold { border-color: rgba(232,179,57,0.9); background: rgba(232,179,57,0.12); }
  .toggle.max-lvl.gummy { border-color: rgba(255,95,163,0.9); background: rgba(255,95,163,0.12); }
  .toggle.max-lvl.galaxy { border-color: rgba(124,108,240,0.9); background: rgba(124,108,240,0.14); }

  .variant-icon {
    width: 44px;
    height: 44px;
    object-fit: contain;
    opacity: 0.3;
    transition: opacity 0.15s ease;
  }

  .toggle.have .variant-icon { opacity: 0.75; }
  .toggle.max-lvl .variant-icon { opacity: 1; }

  .toggle-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1px;
    line-height: 1.1;
    margin-top: 2px;
  }

  .toggle.have .toggle-label { color: var(--have); }
  .toggle.max-lvl .toggle-label { color: var(--gold) !important; font-weight: 900; letter-spacing: 0.5px; }
  .toggle:not(.have) .toggle-label { color: var(--need); }

  .legend-bar {
    font-size: 11px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 8px 2px 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-bar {
    margin-top: 8px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    background: var(--panel);
    border-radius: 12px;
    padding: 12px 14px;
    border: 1px solid #1d2331;
    gap: 8px;
  }

  .progress-label {
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.2px;
    line-height: 1.3;
  }

  .progress-track {
    width: 100%;
    height: 8px;
    background: #1d2331;
    border-radius: 100px;
    overflow: hidden;
    margin-top: 6px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gummy), var(--galaxy));
    transition: width 0.3s ease;
  }

  .cta {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    color: var(--ink);
    line-height: 1.2;
  }

  .cta span { color: var(--gold); }

  .loading {
    text-align: center;
    color: var(--ink-dim);
    padding: 40px;
    font-size: 14px;
  }

  .reset-btn {
    background: none;
    border: 1px solid #3a4154;
    color: var(--ink-dim);
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
  }

  .reset-btn:hover { border-color: var(--need); color: var(--need); }
</style>
</head>
<body>
  <div class="wrap" id="app">
    <div class="loading">Loading your collection grid…</div>
  </div>

<script>
const SPRITES = [
  { id: "water", name: "Water", variants: ["normal","gold","gummy","galaxy"] },
  { id: "earth", name: "Earth", variants: ["normal","gold","gummy","galaxy"] },
  { id: "fire", name: "Fire", variants: ["normal","gold","gummy","galaxy"] },
  { id: "duck", name: "Duck", variants: ["normal","gold","gummy","galaxy"] },
  { id: "ghost", name: "Ghost", variants: ["normal","gold","gummy","galaxy"] },
  { id: "dream", name: "Dream", variants: ["normal","gold","gummy","galaxy"] },
  { id: "demon", name: "Demon", variants: ["normal","gold","gummy","galaxy"] },
  { id: "punk", name: "Punk", variants: ["normal","gold","gummy","galaxy"] },
  { id: "king", name: "King", variants: ["normal","gold","gummy","galaxy"] },
  { id: "burntpeanut", name: "Burnt Peanut", variants: ["peanut"] },
  { id: "zeropoint", name: "Zero Point", variants: ["normal","gold","gummy","galaxy"] },
  { id: "fishy", name: "Fishy", variants: ["normal","gold","gummy","galaxy"] },
  { id: "striker", name: "Striker", variants: ["normal","gold","gummy","galaxy"] },
  { id: "aura", name: "Aura", variants: ["normal","gold","gummy","galaxy"] },
  { id: "boss", name: "Boss", variants: ["normal","gold","gummy","galaxy"] },
  { id: "grimreaper", name: "Grim Reaper", variants: ["normal","gold","gummy","galaxy"] }
];

const DEFAULT_STATE = {
  username: "",
  inventory: {}
};

SPRITES.forEach(s => {
  DEFAULT_STATE.inventory[s.id] = {};
  s.variants.forEach(v => {
    DEFAULT_STATE.inventory[s.id][v] = 0;
  });
});

const STORAGE_KEY = "sprite-checklist-state-v10";
let state = null;

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      state = JSON.parse(saved);
      SPRITES.forEach(s => {
        if (!state.inventory[s.id]) state.inventory[s.id] = {};
        s.variants.forEach(v => {
          if (state.inventory[s.id][v] === undefined) state.inventory[s.id][v] = 0;
        });
      });
    } else {
      state = JSON.parse(JSON.stringify(DEFAULT_STATE));
    }
  } catch (e) {
    state = JSON.parse(JSON.stringify(DEFAULT_STATE));
  }
  render();
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.error("Failed to save state:", e);
  }
}

function cycleLevel(spriteId, variant) {
  let currentLevel = state.inventory[spriteId][variant] || 0;
  let nextLevel = currentLevel + 1;
  if (nextLevel > 5) nextLevel = 0;

  state.inventory[spriteId][variant] = nextLevel;
  saveState();
  render();
}

function updateUsername(newName) {
  state.username = newName;
  saveState();
  const ctaName = document.getElementById("cta-username");
  if(ctaName) {
    ctaName.innerText = newName || "[Input Username]";
  }
}

function resetAll() {
  if (!confirm("Clear your checklist and reset all levels to zero?")) return;
  state = JSON.parse(JSON.stringify(DEFAULT_STATE));
  saveState();
  render();
}

function exportAsImage() {
  const targetElement = document.getElementById("capture-area");
  const exportBtn = document.querySelector(".export-btn");
  
  exportBtn.innerText = "Generating...";
  
  targetElement.classList.add("social-export-mode");
  
  setTimeout(() => {
    html2canvas(targetElement, {
      useCORS: true,
      allowTaint: true,
      scale: 2, 
      backgroundColor: "#0b0e14",
      width: 600, 
      logging: false
    }).then(canvas => {
      const nameString = state.username ? state.username.replace(/\s+/g, '_') : 'My';
      const link = document.createElement("a");
      link.download = `${nameString}_Fortnite_Sprite_Checklist.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
      
      targetElement.classList.remove("social-export-mode");
      exportBtn.innerText = "Export PNG Image";
    }).catch(err => {
      console.error("Image synthesis failed:", err);
      targetElement.classList.remove("social-export-mode");
      exportBtn.innerText = "Error! Try Again";
    });
  }, 100);
}

function render() {
  const app = document.getElementById("app");

  let totalPointsPossible = 0;
  let currentPointsEarned = 0;
  let imageCounter = 383; 

  SPRITES.forEach(s => {
    s.variants.forEach(v => {
      totalPointsPossible += 5;
      let lvl = state.inventory[s.id][v] || 0;
      currentPointsEarned += lvl;
    });
  });
  
  const pct = Math.round((currentPointsEarned / totalPointsPossible) * 100);

  const missingNames = SPRITES.filter(s =>
    s.variants.some(v => (state.inventory[s.id][v] || 0) < 5)
  ).map(s => s.name);

  const missingLabel = missingNames.length
    ? `Still leveling: ${missingNames.slice(0, 3).join(", ")}${missingNames.length > 3 ? "..." : ""}`
    : "All styles fully Maxed! 🎉";

  let cardsHtml = SPRITES.map(s => {
    const isSingle = s.variants.length === 1;
    
    const cells = s.variants.map(v => {
      let lvl = state.inventory[s.id][v] || 0;

      let btnClass = "";
      let labelText = "✕ NEED";
      if (!isSingle) labelText = v;
      
      if (lvl > 0) {
        btnClass = "have " + v;
        labelText = "LVL " + lvl;
        if (!isSingle) labelText = v.toUpperCase() + " L" + lvl;
      }
      if (lvl === 5) {
        btnClass = "max-lvl " + v;
        labelText = v.toUpperCase() + " MAX";
        if (isSingle) labelText = "MAX";
      }

      let imagePath = "";
      if (s.id === "duck" && v === "normal") {
        imagePath = `Images/IMG_0435.webp`;
      } else {
        const currentImgNum = String(imageCounter).padStart(4, '0');
        imagePath = `Images/IMG_${currentImgNum}.webp`;
      }
      
      imageCounter++;

      return `
        <div class="toggle ${btnClass}" onclick="cycleLevel('${s.id}','${v}')">
          <img class="variant-icon" src="${imagePath}" onerror="this.style.opacity='0.15';" alt="">
          <div class="toggle-label">${labelText}</div>
        </div>`;
    }).join("");

    return `
      <div class="sprite-card">
        <div class="sprite-info">
          <div class="sprite-name">${s.name}</div>
        </div>
        <div class="variants-row ${isSingle ? 'single-variant' : ''}">
          ${cells}
        </div>
      </div>`;
  }).join("");

  app.innerHTML = `
    <div class="action-bar">
      <div class="hint">Tap variant tiles below to modify levels. Ready to share? Tap export!</div>
      <button class="export-btn" onclick="exportAsImage()">Export PNG Image</button>
    </div>

    <div class="export-container" id="capture-area">
      <div class="header">
        <div class="title-block">
          <div class="eyebrow">Fortnite · Sprite Trading</div>
          <h1>SPRITE CHECKLIST</h1>
        </div>
        <div class="epic-tag">
          <div class="label">Epic Username</div>
          <input type="text" class="username-input" value="${state.username}" oninput="updateUsername(this.value)" placeholder="Type Username...">
        </div>
      </div>

      <div class="sprites-grid">
        ${cardsHtml}
      </div>

      <div class="legend-bar">
        <span>Cycle levels by tapping styles</span>
        <button class="reset-btn" onclick="resetAll()">Reset all to zero</button>
      </div>

      <div class="footer-bar">
        <div>
          <div class="progress-label">${missingLabel}</div>
          <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="cta">Got what I need? Comment your name & add <span id="cta-username">${state.username || "[Input Username]"}</span></div>
      </div>
    </div>
  `;
}

loadState();
</script>
</body>
</html>
