  <div class="wrap" id="app">

<script>
const SPRITES = [
  { id: "water", name: "Water", variants: ["normal","gold","gummy","galaxy","gem","holofoil"] },
  { id: "earth", name: "Earth", variants: ["normal","gold","gummy","galaxy","gem"] },
  { id: "fire", name: "Fire", variants: ["normal","gold","gummy","galaxy","holofoil"] },
  { id: "duck", name: "Duck", variants: ["normal","gold","gummy","galaxy","gem"] },
  { id: "ghost", name: "Ghost", variants: ["normal","gold","gummy","galaxy","holofoil"] },
  { id: "dream", name: "Dream", variants: ["normal","gold","gummy","galaxy"] },
  { id: "demon", name: "Demon", variants: ["normal","gold","gummy","galaxy","gem"] },
  { id: "punk", name: "Punk", variants: ["normal","gold","gummy","galaxy"] },
  { id: "king", name: "King", variants: ["normal","gold","gummy","galaxy","holofoil"] },
  { id: "burntpeanut", name: "Burnt Peanut", variants: ["peanut"] },
  { id: "zeropoint", name: "Zero Point", variants: ["normal","gold","gummy","galaxy","gem"] },
  { id: "fishy", name: "Fishy", variants: ["normal","gold","gummy","galaxy"] },
  { id: "striker", name: "Striker", variants: ["normal","gold","gummy","galaxy","holofoil"] },
  { id: "aura", name: "Aura", variants: ["normal","gold","gummy","galaxy","gem"] },
  { id: "boss", name: "Boss", variants: ["normal","gold","gummy","galaxy"] },
  { id: "grimreaper", name: "Grim Reaper", variants: ["normal","gold","gummy","galaxy"] },
  { id: "air", name: "Air", variants: ["normal","gold","gummy","galaxy","holofoil"] },
  { id: "seven", name: "Seven", variants: ["normal","gold","gummy","galaxy","holofoil"] },
  { id: "batman", name: "Batman", variants: ["normal","gold","gummy","galaxy","holofoil"] },
  { id: "pollo", name: "Pollo", variants: ["pollo"] },
  { id: "vinijr", name: "Vini Jr", variants: ["vinijr"] }
];


const DEFAULT_STATE = {
  username: "",
  inventory: {}
};

SPRITES.forEach(s => {
  DEFAULT_STATE.inventory[s.id] = {};
  s.variants.forEach(v => {
    DEFAULT_STATE.inventory[s.id][v] = 0;
  });
});

const STORAGE_KEY = "sprite-checklist-state-v15"; 
let state = null;

let touchTimer = null;
let isLongPress = false;

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      state = JSON.parse(saved);
      SPRITES.forEach(s => {
        if (!state.inventory[s.id]) state.inventory[s.id] = {};
        s.variants.forEach(v => {
          if (state.inventory[s.id][v] === undefined) state.inventory[s.id][v] = 0;
        });
      });
    } else {
      state = JSON.parse(JSON.stringify(DEFAULT_STATE));
    }
  } catch (e) {
    state = JSON.parse(JSON.stringify(DEFAULT_STATE));
  }
  render();
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.error("Failed to save state:", e);
  }
}

function handleTileTap(spriteId, variant) {
  if (isLongPress) return;
  
  let currentLevel = state.inventory[spriteId][variant] || 0;
  let nextLevel = currentLevel + 1;
  if (nextLevel > 5) nextLevel = 0;

  state.inventory[spriteId][variant] = nextLevel;
  saveState();
  render();
}

function handleLongPress(spriteId, variant) {
  state.inventory[spriteId][variant] = 5;
  saveState();
  render();
}

function maxEntireRow(spriteId) {
  const sprite = SPRITES.find(s => s.id === spriteId);
  if (!sprite) return;
  
  sprite.variants.forEach(v => {
    state.inventory[spriteId][v] = 5;
  });
  saveState();
  render();
}

function setupTouchListeners(element, spriteId, variant) {
  const startHandler = (e) => {
    isLongPress = false;
    touchTimer = setTimeout(() => {
      isLongPress = true;
      handleLongPress(spriteId, variant);
    }, 400);
  };

  const endHandler = (e) => {
    if (touchTimer) clearTimeout(touchTimer);
    if (!isLongPress) {
      handleTileTap(spriteId, variant);
    }
  };

  const cancelHandler = () => {
    if (touchTimer) clearTimeout(touchTimer);
  };

  element.addEventListener('touchstart', startHandler, { passive: true });
  element.addEventListener('touchend', endHandler);
  element.addEventListener('touchmove', cancelHandler, { passive: true });
  
  element.addEventListener('mousedown', startHandler);
  element.addEventListener('mouseup', endHandler);
  element.addEventListener('mouseleave', cancelHandler);
}

function updateUsername(newName) {
  state.username = newName;
  saveState();
  
  const staticBlock = document.getElementById("username-mirror");
  if(staticBlock) staticBlock.innerText = newName || "PLAYER";

  const ctaName = document.getElementById("cta-username");
  if(ctaName) ctaName.innerText = newName || "[Input Username]";
}

function resetAll() {
  if (!confirm("Clear your checklist and reset all levels to zero?")) return;
  state = JSON.parse(JSON.stringify(DEFAULT_STATE));
  saveState();
  render();
}

function exportAsImage() {
  const targetElement = document.getElementById("capture-area");
  const exportBtn = document.querySelector(".export-btn");
  
  exportBtn.innerText = "Generating Share Screen...";
  targetElement.classList.add("social-export-mode");
  
  setTimeout(() => {
    html2canvas(targetElement, {
      useCORS: true,
      allowTaint: true,
      scale: 2, 
      backgroundColor: "#0b0e14",
      width: 580, 
      logging: false
    }).then(canvas => {
      const nameString = state.username ? state.username.replace(/\s+/g, '_') : 'My';
      const fileName = `${nameString}_Fortnite_Sprite_Checklist.png`;
      
      canvas.toBlob(blob => {
        const imageFile = new File([blob], fileName, { type: "image/png" });
        
        if (navigator.canShare && navigator.canShare({ files: [imageFile] })) {
          navigator.share({
            files: [imageFile],
            title: 'My Sprite Collection Checklist',
            text: 'Check out my current Fortnite Sprite level status!'
          }).then(() => {
            targetElement.classList.remove("social-export-mode");
            exportBtn.innerText = "Export PNG Image";
          }).catch(err => {
            console.log("Share sheet action dismissed.", err);
            fallbackDownload(canvas, fileName);
            targetElement.classList.remove("social-export-mode");
            exportBtn.innerText = "Export PNG Image";
          });
        } else {
          fallbackDownload(canvas, fileName);
          targetElement.classList.remove("social-export-mode");
          exportBtn.innerText = "Export PNG Image";
        }
      }, "image/png");

    }).catch(err => {
      console.error("Image synthesis failed:", err);
      targetElement.classList.remove("social-export-mode");
      exportBtn.innerText = "Error! Try Again";
    });
  }, 120);
}

function fallbackDownload(canvas, fileName) {
  const link = document.createElement("a");
  link.download = fileName;
  link.href = canvas.toDataURL("image/png");
  link.click();
}

function render() {
  const app = document.getElementById("app");

  let totalPointsPossible = 0;
  let currentPointsEarned = 0;
  let imageCounter = 383;

    s.variants.forEach(v => {
      totalPointsPossible += 5;
      let lvl = state.inventory[s.id][v] || 0;
      currentPointsEarned += lvl;
    });
  });
  
  const pct = Math.round((currentPointsEarned / totalPointsPossible) * 100);

  const missingNames = SPRITES.filter(s =>
    s.variants.some(v => (state.inventory[s.id][v] || 0) < 5)
  ).map(s => s.name);

        if (s.id === "king") imagePath = `Images/IMG_0475.webp`;
        if (s.id === "striker") imagePath = `Images/IMG_0476.webp`;
        if (s.id === "air") imagePath = `Images/IMG_0477.webp`;
        if (s.id === "seven") imagePath = `Images/IMG_0478.webp`;
      } else {
        const currentImgNum = String(imageCounter).padStart(4, '0');
        imagePath = `Images/IMG_${currentImgNum}.webp`;
      }
      
      if (v !== "gem" && v !== "holofoil" && s.id !== "air" && s.id !== "seven") {
        imageCounter++;
      }

      return `
        <div class="toggle ${btnClass}" data-sprite="${s.id}" data-variant="${v}">
          <img class="variant-icon" src="${imagePath}" onerror="this.style.opacity='0.15';" alt="">
          <div class="toggle-label">${labelText}</div>
        </div>`;
    }).join("");

    return `
      <div class="sprite-card">
        <div class="sprite-info">
          <div class="sprite-name">${s.name}</div>
          <button class="max-row-btn" onclick="maxEntireRow('${s.id}')">MAX ROW</button>
        </div>
        <div class="variants-row">
          ${cells}
        </div>
      </div>`;
  }).join("");

  app.innerHTML = `
    <div class="action-bar">
      <div class="hint">Tap tiles to cycle level. Hold down a tile or tap "MAX ROW" to instantly hit Level 5!</div>
      <button class="export-btn" onclick="exportAsImage()">Export PNG Image</button>
    </div>

    <div class="export-container" id="capture-area">
      <div class="header">
        <div class="title-block">
          <div class="eyebrow">Fortnite · Sprite Trading</div>
          <h1>SPRITE CHECKLIST</h1>
        </div>
        <div class="epic-tag">
          <div class="label">Epic Username</div>
          <input type="text" class="username-input" value="${state.username}" oninput="updateUsername(this.value)" placeholder="Type Username...">
          <div class="username-static" id="username-mirror">${state.username || "PLAYER"}</div>
        </div>
      </div>

      <div class="sprites-grid">
        ${cardsHtml}
      </div>

      <div class="legend-bar">
        <div class="link-group">
          <a href="https://buymeacoffee.com/benitopak96" target="_blank" class="tip-link">☕ Support the Dev</a>
          <a href="https://discord.gg/sfat9mcv73" target="_blank" class="tip-link discord-link">💬 Join Discord</a>
        </div>
        <button class="reset-btn" onclick="resetAll()">Reset all</button>
      </div>

      <div class="footer-bar">
        <div>
          <div class="progress-label">${missingLabel}</div>
          <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="cta">Got what I need? Comment your name & add <span id="cta-username">${state.username || "[Input Username]"}</span></div>
      </div>
    </div>
  `;

  document.querySelectorAll('.toggle').forEach(element => {
    const spriteId = element.getAttribute('data-sprite');
    const variant = element.getAttribute('data-variant');
    setupTouchListeners(element, spriteId, variant);
  });
}

loadState();
</script>
</body>
</html>
